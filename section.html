<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #172b4d;
      background: transparent;
    }
    #root {
      padding: 12px 4px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .status-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 14px;
      border-radius: 6px;
      border-left: 4px solid #c1c7d0;
      background: #f4f5f7;
    }
    .status-card.working { border-left-color: #61bd4f; background: #ecf7e6; }
    .status-card.idle    { border-left-color: #f2d600; background: #fff9c4; }
    .status-card.break   { border-left-color: #f2d600; background: #fff9c4; }
    .status-card.no_work { border-left-color: #eb5a46; background: #ffece8; }

    .status-headline {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-detail {
      font-size: 13px;
      color: #5e6c84;
      font-variant-numeric: tabular-nums;
    }
    .status-detail b { color: #172b4d; }

    .total {
      font-size: 13px;
      color: #5e6c84;
      font-variant-numeric: tabular-nums;
    }

    summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: #172b4d;
      padding: 4px 0;
      user-select: none;
    }
    summary:hover { color: #0079bf; }

    ul#sessions {
      list-style: none;
      margin: 6px 0 0;
      padding: 0;
      font-size: 13px;
    }
    ul#sessions li {
      padding: 6px 0;
      border-bottom: 1px solid #ebecf0;
    }
    ul#sessions li:last-child { border-bottom: none; }
    .muted { color: #5e6c84; font-weight: 400; }

    .footer {
      margin-top: 4px;
      font-size: 11px;
      color: #97a0af;
      font-style: italic;
    }

    /* Admin-only поля (cost, тип монтажу) */
    .admin-block {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #dfe1e6;
      border-radius: 6px;
      background: #fafbfc;
    }
    .admin-block.visible { display: flex; }
    .admin-block-title {
      font-size: 11px;
      font-weight: 600;
      color: #5e6c84;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .admin-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .admin-row label {
      font-size: 12px;
      color: #5e6c84;
      min-width: 110px;
    }
    .admin-row input,
    .admin-row select {
      flex: 1;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #c1c7d0;
      border-radius: 4px;
      font-family: inherit;
      background: #fff;
      color: #172b4d;
    }
    .admin-row input:focus,
    .admin-row select:focus {
      outline: none;
      border-color: #0079bf;
    }
    .admin-saving {
      font-size: 11px;
      color: #5e6c84;
      font-style: italic;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="status" class="status-card no_work">
      <div class="status-headline" id="status-headline">Завантажую…</div>
      <div class="status-detail" id="status-detail"></div>
    </div>

    <div class="total" id="total">Загальний час по картці: —</div>

    <div id="admin-block" class="admin-block">
      <div class="admin-block-title">🔒 Admin · вартість і тип монтажу</div>
      <div class="admin-row">
        <label for="admin-cost">Вартість (грн)</label>
        <input id="admin-cost" type="number" min="0" step="0.01" placeholder="—">
      </div>
      <div class="admin-row">
        <label for="admin-type">Тип монтажу</label>
        <select id="admin-type">
          <option value="">—</option>
          <option value="podcast">Подкаст / інтерв'ю</option>
          <option value="reels">Рілс</option>
          <option value="documentary">Документальний</option>
          <option value="motion">Моушн графіка</option>
        </select>
      </div>
      <div id="admin-saving" class="admin-saving"></div>
    </div>

    <details>
      <summary id="sessions-summary">Останні сесії</summary>
      <ul id="sessions">
        <li class="muted">Завантажую…</li>
      </ul>
    </details>

    <div class="footer">Сесії стартують з плагіна LOCATION FLOW у Premiere</div>
  </div>

  <script src="./section.js"></script>
</body>
</html>
